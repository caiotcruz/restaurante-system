# src/main/resources/application.yml
server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restaurante}
    username: ${DB_USERNAME:caio}
    password: ${DB_PASSWORD:senha123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:senha123}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:caio}
    password: ${RABBITMQ_PASSWORD:senha123}

jwt:
  secret: ${JWT_SECRET:rY8mP2xVq4Kj9Nc7Tz5HwLf1Ba6DsQe3Ui0OpXvRnMk}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.restaurante: ${LOG_LEVEL:INFO}